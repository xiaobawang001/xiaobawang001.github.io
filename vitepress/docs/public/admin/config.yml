# Decap CMS — 在线写作后台
# OAuth 代理部署说明见 /guide/cms

local_backend: true

backend:
  name: github
  repo: xiaobawang001/blog
  branch: master
  base_url: https://blog-cms-oauth.blog-oauth-9c03ab1fd2.workers.dev
  auth_endpoint: auth

locale: zh_Hans

media_folder: vitepress/docs/public/uploads
public_folder: /blog/uploads

slug:
  encoding: unicode
  clean_accents: true
  sanitize:
    mode: relative

collections:
  - name: server
    label: 服务器笔记
    label_singular: 文章
    folder: vitepress/docs/server
    path: '{{slug}}'
    create: true
    nested:
      depth: 6
      summary: '{{title}}'
    extension: md
    format: frontmatter
    filter:
      field: path
      pattern: '(^|/)index$'
    fields:
      - { label: 标题, name: title, widget: string, hint: '侧栏与页面标题' }
      - { label: 排序, name: order, widget: number, value_type: int, default: 0, hint: '数字越小越靠前' }
      - { label: 标签, name: tags, widget: list, default: [], hint: '如 docker、运维' }
      - { label: 正文, name: body, widget: markdown }

  - name: guide
    label: 指南
    label_singular: 文章
    folder: vitepress/docs/guide
    path: '{{slug}}'
    create: true
    extension: md
    format: frontmatter
    filter:
      field: path
      pattern: '(^|/)index$'
    fields:
      - { label: 标题, name: title, widget: string }
      - { label: 排序, name: order, widget: number, value_type: int, default: 0 }
      - { label: 标签, name: tags, widget: list, default: [] }
      - { label: 正文, name: body, widget: markdown }

  - name: folder_indexes
    label: 目录名称
    label_singular: 目录
    files:
      - label: 服务器（根目录）
        name: server-root
        file: vitepress/docs/server/index.md
        fields:
          - { label: 目录标题, name: title, widget: string }
          - { label: 排序, name: order, widget: number, value_type: int, required: false }
          - { label: 说明, name: body, widget: markdown, required: false }
      - label: 指南（根目录）
        name: guide-root
        file: vitepress/docs/guide/index.md
        fields:
          - { label: 目录标题, name: title, widget: string }
          - { label: 排序, name: order, widget: number, value_type: int, required: false }
          - { label: 说明, name: body, widget: markdown, required: false }
      - label: 1Panel
        name: onepannel
        file: vitepress/docs/server/0-onepannel/index.md
        fields:
          - { label: 目录标题, name: title, widget: string }
          - { label: 排序, name: order, widget: number, value_type: int, required: false }
          - { label: 说明, name: body, widget: markdown, required: false }
      - label: Docker
        name: docker
        file: vitepress/docs/server/1-docker/index.md
        fields:
          - { label: 目录标题, name: title, widget: string }
          - { label: 排序, name: order, widget: number, value_type: int, required: false }
          - { label: 说明, name: body, widget: markdown, required: false }
      - label: PostgreSQL
        name: psql
        file: vitepress/docs/server/1-docker/3-psql/index.md
        fields:
          - { label: 目录标题, name: title, widget: string }
          - { label: 排序, name: order, widget: number, value_type: int, required: false }
          - { label: 说明, name: body, widget: markdown, required: false }
