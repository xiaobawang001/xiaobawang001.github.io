name: Deploy CMS OAuth Worker

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'cms/oauth-worker/**'
      - '.github/workflows/deploy-cms-oauth.yml'

concurrency:
  group: cms-oauth-worker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GITHUB_CLIENT_ID: ${{ secrets.CMS_OAUTH_CLIENT_ID }}
      GITHUB_CLIENT_SECRET: ${{ secrets.CMS_OAUTH_CLIENT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify Cloudflare credentials
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "::error::请先在 Repository secrets 中配置 CLOUDFLARE_API_TOKEN 和 CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cms/oauth-worker/package-lock.json

      - name: Install dependencies
        working-directory: cms/oauth-worker
        run: npm ci

      - name: Verify Cloudflare account
        run: |
          set -euo pipefail
          VERIFY=$(curl -sS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify")
          if [ "$(echo "$VERIFY" | jq -r '.success')" != "true" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN 无效或已过期"
            echo "$VERIFY" | jq .
            exit 1
          fi
          ACCOUNT=$(curl -sS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}")
          if [ "$(echo "$ACCOUNT" | jq -r '.success')" != "true" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID 无效。请到 Cloudflare 右侧边栏 → Workers & Pages → 右上角 Account ID 复制，不要填 Zone ID。"
            echo "$ACCOUNT" | jq .
            exit 1
          fi
          echo "Account: $(echo "$ACCOUNT" | jq -r '.result.name')"

      - name: Ensure workers.dev subdomain
        id: cf_subdomain
        run: |
          set -euo pipefail
          API="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/subdomain"
          # 未注册子域时 API 返回 HTTP 404（code 10007），不能用 curl -f
          HTTP_CODE=$(curl -sS -o /tmp/cf-subdomain.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" "$API")
          EXISTING=$(jq -r '.result.subdomain // empty' /tmp/cf-subdomain.json 2>/dev/null || true)
          if [ "$HTTP_CODE" = "200" ] && [ -n "$EXISTING" ]; then
            echo "subdomain=$EXISTING" >> "$GITHUB_OUTPUT"
            echo "已注册 workers.dev 子域: $EXISTING"
            exit 0
          fi
          if [ "$HTTP_CODE" != "404" ] && [ "$HTTP_CODE" != "200" ]; then
            echo "::error::查询 workers.dev 子域失败 (HTTP $HTTP_CODE)"
            cat /tmp/cf-subdomain.json | jq . || cat /tmp/cf-subdomain.json
            exit 1
          fi
          PREFERRED="${CLOUDFLARE_WORKERS_SUBDOMAIN:-blog-oauth-$(echo "$CLOUDFLARE_ACCOUNT_ID" | tr -d '-' | cut -c1-10)}"
          echo "尚未注册 workers.dev 子域，尝试自动注册: $PREFERRED"
          RESULT=$(curl -sS -X PUT "$API" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"subdomain\":\"${PREFERRED}\"}")
          if [ "$(echo "$RESULT" | jq -r '.success')" != "true" ]; then
            echo "::error::未能自动注册 workers.dev 子域。请打开 Cloudflare 控制台一次性完成注册："
            echo "::error::https://dash.cloudflare.com/?to=/:account/workers-and-pages"
            echo "$RESULT" | jq .
            exit 1
          fi
          echo "subdomain=$PREFERRED" >> "$GITHUB_OUTPUT"
          echo "已注册 workers.dev 子域: $PREFERRED"
        env:
          CLOUDFLARE_WORKERS_SUBDOMAIN: ${{ vars.CLOUDFLARE_WORKERS_SUBDOMAIN }}

      - name: Deploy Worker
        id: deploy
        working-directory: cms/oauth-worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          npx wrangler deploy 2>&1 | tee /tmp/wrangler-deploy.log
          SUB="${{ steps.cf_subdomain.outputs.subdomain }}"
          URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev' /tmp/wrangler-deploy.log | head -1 || true)
          if [ -z "$URL" ] && [ -n "$SUB" ]; then
            URL="https://blog-cms-oauth.${SUB}.workers.dev"
          fi
          if [ -z "$URL" ]; then
            echo "::error::部署失败。若提示未注册 workers.dev，请访问："
            echo "::error::https://dash.cloudflare.com/${CLOUDFLARE_ACCOUNT_ID}/workers/onboarding"
            exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed: $URL"

      - name: Configure Worker secrets
        id: oauth
        working-directory: cms/oauth-worker
        run: |
          if [ -z "${GITHUB_CLIENT_ID:-}" ] || [ -z "${GITHUB_CLIENT_SECRET:-}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "GitHub OAuth secrets 未配置，跳过写入 Worker"
            exit 0
          fi
          printf '%s' "$GITHUB_CLIENT_ID" | npx wrangler secret put GITHUB_CLIENT_ID
          printf '%s' "$GITHUB_CLIENT_SECRET" | npx wrangler secret put GITHUB_CLIENT_SECRET
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Update Decap CMS config
        if: steps.oauth.outputs.configured == 'true'
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          CONFIG="vitepress/docs/public/admin/config.yml"
          if grep -q "^  base_url:" "$CONFIG"; then
            sed -i "s|^  base_url:.*|  base_url: $URL|" "$CONFIG"
          else
            sed -i "s|# base_url:.*|  base_url: $URL|" "$CONFIG"
          fi
          if grep -q "^  auth_endpoint:" "$CONFIG"; then
            sed -i "s|^  auth_endpoint:.*|  auth_endpoint: auth|" "$CONFIG"
          else
            sed -i 's|# auth_endpoint:.*|  auth_endpoint: auth|' "$CONFIG"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$CONFIG"
          if git diff --staged --quiet; then
            echo "config.yml already up to date"
          else
            git commit -m "chore(cms): update OAuth base_url from worker deploy"
            git push
          fi

      - name: Summary
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          echo "## CMS OAuth Worker" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Worker URL: \`$URL\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- OAuth 回调地址: \`$URL/callback\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- CMS 后台: https://xiaobawang001.github.io/blog/admin/" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.oauth.outputs.configured }}" != "true" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> 下一步：用上述回调地址创建 [GitHub OAuth App](https://github.com/settings/applications/new)，将 Client ID/Secret 写入 **Repository secrets**（\`CMS_OAUTH_CLIENT_ID\`、\`CMS_OAUTH_CLIENT_SECRET\`）后重新运行本 workflow。" >> "$GITHUB_STEP_SUMMARY"
          fi
